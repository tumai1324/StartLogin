# StartLogin 配置文件
# 作者：屏风
# 版本：V2.2

# 数据库设置
database:
  # 数据库文件名
  filename: "startlogin.db"
  # 空闲连接回收时间（秒）
  idle-connection-timeout: 300
  # 自动备份间隔（小时），设为0禁用
  auto-backup-interval: 24
  # 最大备份数量，超过后自动清理最旧的
  auto-backup-max-count: 7

# 线程池设置
thread-pool:
  # 核心线程数
  core-size: 4
  # 最大线程数
  max-size: 8
  # 等待队列容量
  queue-capacity: 100
  # 线程空闲存活时间（秒）
  keep-alive: 60

# 正版验证设置
premium:
  # 是否启用正版验证
  enabled: true
  # Microsoft OAuth client ID（留空使用 MinecraftAuth 默认值）
  client-id: ""
  # 重定向 URI（默认可留空）
  redirect-uri: ""
  # 轮询间隔秒数
  poll-interval: 5
  # 正版玩家是否自动登录
  auto-login: true
  # Mojang API 请求超时（毫秒）
  timeout: 3000
  # 最大重试次数
  max-retries: 3
  # 缓存有效期（分钟）
  cache-duration: 5

# 登录设置
login:
  # 密码最大错误次数
  max-attempts: 5
  # 锁定时间（分钟）
  lock-duration: 30
  # 是否启用单端在线
  single-session: true
  # 密码最小长度
  password-min-length: 6
  # 密码最大长度
  password-max-length: 32
  # 会话缓存超时（分钟），在有效期内再次进入服务器无需输入密码
  # 设为 0 则禁用会话缓存
  session-cache-timeout: 30
  # 禁止使用的简单密码黑名单
  password-blacklist:
    - "123456"
    - "123456789"
    - "12345678"
    - "111111"
    - "000000"
    - "password"
    - "qwerty"
    - "abc123"
    - "123123"
    - "666666"
    - "888888"
    - "admin"
    - "root"
    - "test"
    - "guest"
    - "love"
    - "hello"
    - "welcome"
    - "minecraft"
    - "mc"
    - "server"
    - "player"

# 安全设置
security:
  # 密码强度检测（开启后注册/修改密码时检查密码复杂度）
  password-strength-check: false
  # 密码必须包含大写字母
  require-uppercase: true
  # 密码必须包含小写字母
  require-lowercase: true
  # 密码必须包含数字
  require-digit: true
  # 密码必须包含特殊字符
  require-special: false
  # 异地登录提醒（从不常登录的IP进入时提示）
  remote-login-alert: true
  # 未登录踢出时间（秒），设为0禁用
  kick-timeout: 300
  # 首次登录保护时间（秒），新注册玩家获得无敌效果
  first-login-protection: 30
  # 密码过期天数（0=不限制），超过后强制修改密码
  password-expiry-days: 0
  # 最小账号时长（小时），注册后不能立即注销
  min-account-age-hours: 0

# UI设置
ui:
  # 窗口冷却时间（秒）
  cooldown: 3
  # 登录窗口标题
  login-title: "登录系统"
  # 注册窗口标题
  register-title: "注册账号"
  # 规则窗口标题
  rule-title: "服务器规则"
  # 登录成功欢迎消息（留空则使用默认消息，支持MiniMessage格式）
  welcome-message: ""

# 调试设置
debug:
  # 是否启用详细日志（对话框输入、点击等）
  verbose-logging: false

# 昵称限制
nickname:
  # 是否启用离线玩家昵称检测
  check-premium-name: true
  # 同一IP注册限制
  ip-registration-limit: 3
